<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Models Mindmap</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; background: #f8fafc; }
        #tree-container { flex: 2; cursor: grab; }
        #details-pane { 
            flex: 1; background: white; border-left: 1px solid #e2e8f0; 
            padding: 30px; overflow-y: auto; box-shadow: -2px 0 5px rgba(0,0,0,0.05);
        }
        .node circle { fill: #fff; stroke: #3b82f6; stroke-width: 3px; cursor: pointer; }
        .node text { font: 12px sans-serif; font-weight: 600; }
        .link { fill: none; stroke: #cbd5e1; stroke-width: 2px; }
        h2 { color: #1e293b; margin-top: 0; }
        p { line-height: 1.6; color: #475569; }
        .hint { font-style: italic; color: #94a3b8; }
    </style>
</head>
<body>

<div id="tree-container"></div>
<div id="details-pane">
    <h2 id="detail-title">AI Models Explorer</h2>
    <div id="detail-content">
        <p class="hint">Click on a comparison point (e.g., Deepness, Famous Feature) to see the full details here.</p>
    </div>
</div>

<script>
    const data = {
        "name": "AI Models",
        "children": [
            {
                "name": "Vanilla NN",
                "children": [
                    {"name": "Deepness", "desc": "Typically shallow to moderate. Deep versions suffer from vanishing gradients."},
                    {"name": "Famous Feature", "desc": "Fully Connected (Dense) Layers where every node connects to every node in adjacent layers."},
                    {"name": "Area of Use", "desc": "Tabular data, basic classification, and financial forecasting."}
                ]
            },
            {
                "name": "CNN",
                "children": [
                    {"name": "Deepness", "desc": "Can be extremely deep (ResNet, VGG). Designed for layer stacking."},
                    {"name": "Famous Feature", "desc": "Convolutional Filters (Kernels) and Pooling Layers for spatial invariance."},
                    {"name": "Area of Use", "desc": "Computer Vision, image recognition, and autonomous driving."}
                ]
            },
            {
                "name": "Transformer",
                "children": [
                    {"name": "Deepness", "desc": "Massively deep (GPT-3 has 96 layers) using residual connections."},
                    {"name": "Famous Feature", "desc": "Multi-Head Self-Attention. Processes all data simultaneously."},
                    {"name": "Area of Use", "desc": "Large Language Models (ChatGPT), Translation, and Vision Transformers."}
                ]
            }
            // Add other models from the CSV here following the same pattern
        ]
    };

    const width = window.innerWidth * 0.6;
    const margin = {top: 20, right: 90, bottom: 30, left: 90};
    const dy = width / 3;
    const dx = 50;
    const tree = d3.tree().nodeSize([dx, dy]);
    const diagonal = d3.linkHorizontal().x(d => d.y).y(d => d.x);

    const svg = d3.select("#tree-container").append("svg")
        .attr("width", "100%")
        .attr("height", "100%")
        .attr("viewBox", [-margin.left, -margin.top, width, dx * 10])
        .call(d3.zoom().on("zoom", (event) => g.attr("transform", event.transform)))
        .append("g");

    const g = svg.append("g");
    const gLink = g.append("g").attr("class", "link-group");
    const gNode = g.append("g").attr("class", "node-group");

    const root = d3.hierarchy(data);
    root.x0 = dy / 2;
    root.y0 = 0;
    root.children.forEach(collapse);

    update(root);

    function collapse(d) { if (d.children) { d._children = d.children; d.children = null; } }

    function update(source) {
        const nodes = root.descendants().reverse();
        const links = root.links();
        tree(root);

        const node = gNode.selectAll("g").data(nodes, d => d.id || (d.id = ++i));
        const nodeEnter = node.enter().append("g")
            .attr("class", "node")
            .attr("transform", d => `translate(${source.y0},${source.x0})`)
            .on("click", (event, d) => {
                if (d.data.desc) {
                    document.getElementById('detail-title').innerText = d.data.name;
                    document.getElementById('detail-content').innerHTML = `<p>${d.data.desc}</p>`;
                }
                d.children = d.children ? null : d._children;
                update(d);
            });

        nodeEnter.append("circle").attr("r", 6);
        nodeEnter.append("text")
            .attr("dy", "0.31em")
            .attr("x", d => d._children ? -10 : 10)
            .attr("text-anchor", d => d._children ? "end" : "start")
            .text(d => d.data.name);

        const nodeUpdate = node.merge(nodeEnter).transition().duration(250)
            .attr("transform", d => `translate(${d.y},${d.x})`);

        const link = gLink.selectAll("path").data(links, d => d.target.id);
        link.enter().append("path").attr("class", "link")
            .attr("d", d => { const o = {x: source.x0, y: source.y0}; return diagonal({source: o, target: o}); })
            .merge(link).transition().duration(250).attr("d", diagonal);

        nodes.forEach(d => { d.x0 = d.x; d.y0 = d.y; });
    }
    let i = 0;
</script>
</body>
</html>
